models:
  - type: main
    engine: anthropic
    model: claude-haiku-4-5-20251001
    api_key_env_var: ANTHROPIC_API_KEY

  - type: embeddings
    engine: FastEmbed
    model: all-MiniLM-L6-v2

instructions:
  - type: general
    content: |
      You are a banking assistant. Help users with their banking queries.

rails:
  dialog:
    user_messages:
      embeddings_only: true
      embeddings_only_similarity_threshold: 0.75
      embeddings_only_fallback_intent: out of scope
